<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>Acute and critical medical conditions icon</title>
  <defs>
    <style>
      .critical-line { fill: none; stroke: #313c4e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .critical-accent { fill: #ff9a5a; stroke: #313c4e; stroke-width: 2; }
    </style>
  </defs>
  <!-- Heart monitor ECG line -->
  <path class="critical-line" d="M 25 68 L 35 68 L 40 58 L 45 78 L 50 75 L 55 62 L 60 68 L 103 68" stroke-width="3"/>
  <!-- Heart shape -->
  <path class="critical-accent" d="M 64 50 L 70 44 Q 76 38 82 44 Q 86 48 82 56 L 64 70 L 46 56 Q 42 48 46 44 Q 52 38 58 44 Z"/>
  <!-- Alert indicator -->
  <circle class="critical-line" cx="95" cy="50" r="8" stroke-width="2.5"/>
  <line class="critical-line" x1="95" y1="45" x2="95" y2="55" stroke-width="2.5"/>
  <!-- IV line indicator -->
  <line class="critical-line" x1="30" y1="35" x2="30" y2="50" stroke-width="2.5"/>
  <circle class="critical-accent" cx="30" cy="32" r="4"/>
  <!-- Support lines -->
  <path class="critical-line" d="M 40 88 Q 45 95 50 90" stroke-width="2" opacity="0.6"/>
  <path class="critical-line" d="M 78 88 Q 83 95 88 90" stroke-width="2" opacity="0.6"/>
</svg>