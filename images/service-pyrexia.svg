<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <title>Pyrexia of unknown origin icon</title>
  <defs>
    <style>
      .fever-line { fill: none; stroke: #313c4e; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .fever-accent { fill: #ff9a5a; stroke: #313c4e; stroke-width: 2.5; }
    </style>
  </defs>
  <!-- Thermometer bulb -->
  <circle class="fever-accent" cx="50" cy="85" r="12"/>
  <!-- Thermometer stem -->
  <rect class="fever-line" x="46" y="35" width="8" height="50" rx="4" stroke-width="2.5" fill="none"/>
  <!-- Mercury rising inside -->
  <rect class="fever-accent" x="47.5" y="50" width="5" height="34" rx="2.5"/>
  <!-- Heat lines radiating left -->
  <path class="fever-line" d="M 30 65 Q 25 65 20 65" stroke-width="2.5"/>
  <path class="fever-line" d="M 32 75 Q 25 77 18 80" stroke-width="2.5"/>
  <path class="fever-line" d="M 32 55 Q 25 53 18 50" stroke-width="2.5"/>
  <!-- Heat lines radiating right -->
  <path class="fever-line" d="M 70 65 Q 80 65 90 65" stroke-width="2.5"/>
  <path class="fever-line" d="M 68 75 Q 78 77 88 80" stroke-width="2.5"/>
  <path class="fever-line" d="M 68 55 Q 78 53 88 50" stroke-width="2.5"/>
  <!-- Fever indicator scale marks -->
  <line class="fever-line" x1="43" y1="45" x2="39" y2="45" stroke-width="2"/>
  <line class="fever-line" x1="43" y1="55" x2="39" y2="55" stroke-width="2"/>
  <line class="fever-line" x1="43" y1="65" x2="39" y2="65" stroke-width="2"/>
  <line class="fever-line" x1="43" y1="75" x2="39" y2="75" stroke-width="2"/>
</svg>